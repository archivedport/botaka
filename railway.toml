# railway.toml
# ============================================================
#  Configuración de despliegue en Railway.
# ============================================================

[build]
builder        = "NIXPACKS"
buildCommand   = "npm install && npx prisma generate && npx prisma migrate deploy"

[deploy]
startCommand   = "node src/server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[healthcheck]
path           = "/health"
timeout        = 10
interval       = 30
